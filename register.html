<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register | Listings Marketplace</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body class="bg-light">
	<div class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 450px;">
			<h3 class="card-title text-center mb-4">Register</h3>
			<form id="registerForm">
				<div class="mb-3">
					<label for="displayName" class="form-label">Full Name</label>
					<input type="text" class="form-control" id="displayName" placeholder="Your name" required />
				</div>
				<div class="mb-3">
					<label for="email" class="form-label">Email</label>
					<input type="email" class="form-control" id="email" placeholder="email@example.com" required />
				</div>
				<div class="mb-3">
					<label for="password" class="form-label">Password</label>
					<input type="password" class="form-control" id="password" placeholder="Minimum 6 characters" required />
				</div>
				<div class="mb-3">
					<label for="confirmPassword" class="form-label">Confirm Password</label>
					<input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
				</div>
				<button type="submit" class="btn btn-primary w-100">Create Account</button>
			</form>
			<p class="text-center mt-3">
				Already have an account? <a href="/login.html">Login here</a>
			</p>
		</div>
	</div>
	<script type="module" src="/src/pages/register.js"></script>
</body>
</html>

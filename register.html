<!DOCTYPE html>
<html lang="bg">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Регистрация | Listings Marketplace</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body class="bg-light">
	<div class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 450px;">
			<h3 class="card-title text-center mb-4">Регистрация</h3>
			<form id="registerForm">
				<div class="mb-3">
					<label for="displayName" class="form-label">Име</label>
					<input type="text" class="form-control" id="displayName" placeholder="Вашето име" required />
				</div>
				<div class="mb-3">
					<label for="email" class="form-label">Имейл</label>
					<input type="email" class="form-control" id="email" placeholder="email@example.com" required />
				</div>
				<div class="mb-3">
					<label for="password" class="form-label">Парола</label>
					<input type="password" class="form-control" id="password" placeholder="Минимум 6 символа" required />
				</div>
				<div class="mb-3">
					<label for="confirmPassword" class="form-label">Потвърди парола</label>
					<input type="password" class="form-control" id="confirmPassword" placeholder="Повтори паролата" required />
				</div>
				<button type="submit" class="btn btn-primary w-100">Регистрирай се</button>
			</form>
			<p class="text-center mt-3">
				Вече имате акаунт? <a href="/login.html">Влезте тук</a>
			</p>
		</div>
	</div>
	<script type="module" src="/src/pages/register.js"></script>
</body>
</html>

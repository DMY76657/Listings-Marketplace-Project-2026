<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listings Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Listings Marketplace</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <div class="ms-auto d-flex align-items-center gap-2 py-2 py-lg-0">
            <a id="navAddListing" class="btn btn-primary d-none" href="/listing-create.html">Add Listing</a>
            <a id="navProfile" class="btn btn-outline-secondary d-none" href="/profile.html">Profile</a>
            <a id="navLogin" class="btn btn-outline-primary d-none" href="/login.html">Login</a>
            <a id="navRegister" class="btn btn-primary d-none" href="/register.html">Register</a>
            <button id="navLogout" class="btn btn-danger d-none" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-5">
              <label class="form-label" for="searchInput">Search by title</label>
              <input id="searchInput" type="text" class="form-control" placeholder="e.g. iPhone, bike, desk" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label" for="minPriceInput">Min price</label>
              <input id="minPriceInput" type="number" min="0" step="0.01" class="form-control" placeholder="0" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label" for="maxPriceInput">Max price</label>
              <input id="maxPriceInput" type="number" min="0" step="0.01" class="form-control" placeholder="1000" />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label" for="categoryFilter">Category</label>
              <select id="categoryFilter" class="form-select">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Automotive">Automotive</option>
                <option value="Real Estate">Real Estate</option>
                <option value="Fashion">Fashion</option>
                <option value="Books">Books</option>
                <option value="Gaming">Gaming</option>
                <option value="Furniture">Furniture</option>
                <option value="Sports">Sports</option>
                <option value="Pets">Pets</option>
                <option value="Art">Art</option>
                <option value="Tools">Tools</option>
                <option value="Garden">Garden</option>
              </select>
            </div>
            <div class="col-12 col-md-1 d-grid">
              <button id="searchBtn" class="btn btn-primary" type="button">Search</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div id="listingsGrid" class="row g-4"></div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/pages/index.js"></script>
  </body>
</html>

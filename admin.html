<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Admin Panel - Listings Marketplace</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
	</head>
	<body class="bg-light">
		<nav class="navbar navbar-expand-lg bg-white border-bottom">
			<div class="container">
				<a class="navbar-brand fw-semibold" href="/">Listings Marketplace</a>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#mainNavbar"
					aria-controls="mainNavbar"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="mainNavbar">
					<div class="ms-auto d-flex align-items-center gap-2 py-2 py-lg-0">
						<a id="navAddListing" class="btn btn-primary d-none" href="/listing-create.html">Add Listing</a>
						<a id="navProfile" class="btn btn-outline-secondary d-none" href="/profile.html">Profile</a>
						<a id="navLogin" class="btn btn-outline-primary d-none" href="/login.html">Login</a>
						<a id="navRegister" class="btn btn-primary d-none" href="/register.html">Register</a>
						<button id="navLogout" class="btn btn-danger d-none" type="button">Logout</button>
					</div>
				</div>
			</div>
		</nav>

		<main class="container py-4">
			<h1 class="h3 mb-4">Admin Panel</h1>

			<ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
				<li class="nav-item" role="presentation">
					<button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users-pane" type="button" role="tab" aria-controls="users-pane" aria-selected="true">Users</button>
				</li>
				<li class="nav-item" role="presentation">
					<button class="nav-link" id="listings-tab" data-bs-toggle="tab" data-bs-target="#listings-pane" type="button" role="tab" aria-controls="listings-pane" aria-selected="false">Listings</button>
				</li>
			</ul>

			<div class="tab-content" id="adminTabContent">
				<div class="tab-pane fade show active" id="users-pane" role="tabpanel" aria-labelledby="users-tab" tabindex="0">
					<div class="card shadow-sm">
						<div class="card-body">
							<h2 class="h5 mb-3">Users and Roles</h2>
							<div class="table-responsive">
								<table class="table align-middle mb-0">
									<thead>
										<tr>
											<th scope="col">Display Name</th>
											<th scope="col">User ID</th>
											<th scope="col">Role</th>
											<th scope="col">Actions</th>
										</tr>
									</thead>
									<tbody id="usersTableBody"></tbody>
								</table>
							</div>
						</div>
					</div>
				</div>

				<div class="tab-pane fade" id="listings-pane" role="tabpanel" aria-labelledby="listings-tab" tabindex="0">
					<div class="card shadow-sm">
						<div class="card-body">
							<h2 class="h5 mb-3">Listings Moderation</h2>
							<div class="table-responsive">
								<table class="table align-middle mb-0">
									<thead>
										<tr>
											<th scope="col">Title</th>
											<th scope="col">Owner</th>
											<th scope="col">Price</th>
											<th scope="col">Status</th>
											<th scope="col">Actions</th>
										</tr>
									</thead>
									<tbody id="listingsTableBody"></tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
		<script type="module" src="/src/pages/admin.js"></script>
	</body>
</html>

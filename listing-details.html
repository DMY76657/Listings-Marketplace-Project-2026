<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Listing Details - Listings Marketplace</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
	</head>
	<body class="bg-light">
		<nav class="navbar navbar-expand-lg bg-white border-bottom">
			<div class="container">
				<a class="navbar-brand fw-semibold" href="/">Listings Marketplace</a>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#mainNavbar"
					aria-controls="mainNavbar"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="mainNavbar">
					<div class="ms-auto d-flex align-items-center gap-2 py-2 py-lg-0">
						<a id="navAddListing" class="btn btn-primary d-none" href="/listing-create.html">Add Listing</a>
						<a id="navProfile" class="btn btn-outline-secondary d-none" href="/profile.html">Profile</a>
						<a id="navLogin" class="btn btn-outline-primary d-none" href="/login.html">Login</a>
						<a id="navRegister" class="btn btn-primary d-none" href="/register.html">Register</a>
						<button id="navLogout" class="btn btn-danger d-none" type="button">Logout</button>
					</div>
				</div>
			</div>
		</nav>

		<main class="container py-4">
			<section class="card shadow-sm mb-4">
				<div class="card-body">
					<div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
						<h1 id="listingTitle" class="h3 mb-0">Listing</h1>
						<div class="d-flex gap-2">
							<button id="editListingBtn" class="btn btn-outline-primary d-none" type="button">Edit</button>
							<button id="deleteListingBtn" class="btn btn-danger d-none" type="button">Delete</button>
						</div>
					</div>

					<p id="listingDescription" class="mb-3 text-muted"></p>
					<div class="row g-3">
						<div class="col-12 col-md-3">
							<div class="border rounded p-3 bg-white">
								<div class="small text-muted">Price</div>
								<div id="listingPrice" class="fw-semibold"></div>
							</div>
						</div>
						<div class="col-12 col-md-3">
							<div class="border rounded p-3 bg-white">
								<div class="small text-muted">Status</div>
								<div id="listingStatus" class="fw-semibold text-capitalize"></div>
							</div>
						</div>
						<div class="col-12 col-md-6">
							<div class="border rounded p-3 bg-white">
								<div class="small text-muted">Owner</div>
								<div id="listingOwner" class="fw-semibold"></div>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section class="card shadow-sm mb-4">
				<div class="card-body">
					<h2 class="h5 mb-3">Images</h2>
					<div id="imageGallery" class="row g-3"></div>
				</div>
			</section>

			<section class="card shadow-sm">
				<div class="card-body">
					<h2 class="h5 mb-3">Comments</h2>
					<div id="commentsList" class="mb-4"></div>

					<div id="commentFormWrapper" class="d-none">
						<form id="commentForm">
							<div class="mb-3">
								<label for="commentContent" class="form-label">Add comment</label>
								<textarea id="commentContent" class="form-control" rows="3" required></textarea>
							</div>
							<button type="submit" class="btn btn-primary">Submit</button>
						</form>
					</div>
				</div>
			</section>
		</main>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
		<script type="module" src="/src/pages/listing-details.js"></script>
	</body>
</html>

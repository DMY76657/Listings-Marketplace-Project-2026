<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Profile | Listings Marketplace</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body class="bg-light">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6">
				<div class="card shadow p-4">
					<h3 class="card-title text-center mb-4">My Profile</h3>

					<div class="text-center mb-4">
						<img
							id="avatarImage"
							src="https://via.placeholder.com/120?text=Avatar"
							alt="Avatar"
							class="rounded-circle border"
							width="120"
							height="120"
						/>
					</div>

					<form id="profileForm">
						<div class="mb-3">
							<label for="avatar" class="form-label">Upload Avatar</label>
							<input
								type="file"
								class="form-control"
								id="avatar"
								accept="image/png,image/jpeg,image/webp"
							/>
						</div>

						<div class="mb-3">
							<label for="display_name" class="form-label">Display Name</label>
							<input type="text" class="form-control" id="display_name" required />
						</div>

						<button type="submit" class="btn btn-primary w-100">Save</button>
					</form>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="/src/pages/profile.js"></script>
</body>
</html>

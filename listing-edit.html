<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Edit Listing - Listings Marketplace</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
	</head>
	<body class="bg-light">
		<nav class="navbar navbar-expand-lg bg-white border-bottom">
			<div class="container">
				<a class="navbar-brand fw-semibold" href="/">Listings Marketplace</a>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#mainNavbar"
					aria-controls="mainNavbar"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="mainNavbar">
					<div class="ms-auto d-flex align-items-center gap-2 py-2 py-lg-0">
						<a id="navAddListing" class="btn btn-primary d-none" href="/listing-create.html">Add Listing</a>
						<a id="navProfile" class="btn btn-outline-secondary d-none" href="/profile.html">Profile</a>
						<a id="navLogin" class="btn btn-outline-primary d-none" href="/login.html">Login</a>
						<a id="navRegister" class="btn btn-primary d-none" href="/register.html">Register</a>
						<button id="navLogout" class="btn btn-danger d-none" type="button">Logout</button>
					</div>
				</div>
			</div>
		</nav>

		<main class="container py-4">
			<div class="row justify-content-center">
				<div class="col-12 col-lg-8">
					<div class="card shadow-sm mb-4">
						<div class="card-body p-4">
							<h1 class="h4 mb-4">Edit Listing</h1>

							<form id="editListingForm" novalidate>
								<div class="mb-3">
									<label for="title" class="form-label">Title</label>
									<input id="title" name="title" type="text" class="form-control" required />
								</div>

								<div class="mb-3">
									<label for="description" class="form-label">Description</label>
									<textarea id="description" name="description" class="form-control" rows="4" required></textarea>
								</div>

								<div class="mb-3">
									<label for="price" class="form-label">Price</label>
									<input id="price" name="price" type="number" min="0" step="0.01" class="form-control" required />
								</div>

									<div class="mb-3">
										<label for="category" class="form-label">Category</label>
										<select id="category" name="category" class="form-select" required>
											<option value="Electronics">Electronics</option>
											<option value="Automotive">Automotive</option>
											<option value="Real Estate">Real Estate</option>
											<option value="Fashion">Fashion</option>
											<option value="Books">Books</option>
											<option value="Gaming">Gaming</option>
											<option value="Furniture">Furniture</option>
											<option value="Sports">Sports</option>
											<option value="Pets">Pets</option>
											<option value="Art">Art</option>
											<option value="Tools">Tools</option>
											<option value="Garden">Garden</option>
										</select>
									</div>

								<div class="mb-3">
									<label for="status" class="form-label">Status</label>
									<select id="status" name="status" class="form-select">
										<option value="draft">draft</option>
										<option value="published">published</option>
										<option value="archived">archived</option>
									</select>
								</div>

								<div class="mb-4">
									<label for="newImages" class="form-label">Upload New Images</label>
									<input
										id="newImages"
										name="newImages"
										type="file"
										class="form-control"
										multiple
										accept="image/jpeg,image/png,image/webp"
									/>
								</div>

								<button id="saveBtn" type="submit" class="btn btn-primary w-100">Save Changes</button>
							</form>
						</div>
					</div>

					<div class="card shadow-sm">
						<div class="card-body p-4">
							<h2 class="h5 mb-3">Existing Images</h2>
							<div id="existingImagesGrid" class="row g-3"></div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
		<script type="module" src="/src/pages/listing-edit.js"></script>
	</body>
</html>

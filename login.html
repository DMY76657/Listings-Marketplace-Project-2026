<!DOCTYPE html>
<html lang="bg">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Вход | Listings Marketplace</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body class="bg-light">
	<div class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 420px;">
			<h3 class="card-title text-center mb-4">Вход</h3>
			<form id="loginForm">
				<div class="mb-3">
					<label for="email" class="form-label">Имейл</label>
					<input type="email" class="form-control" id="email" placeholder="email@example.com" required />
				</div>
				<div class="mb-3">
					<label for="password" class="form-label">Парола</label>
					<input type="password" class="form-control" id="password" placeholder="Вашата парола" required />
				</div>
				<button type="submit" class="btn btn-primary w-100">Влез</button>
			</form>
			<p class="text-center mt-3">
				Нямате акаунт? <a href="/register.html">Регистрирайте се</a>
			</p>
		</div>
	</div>
	<script type="module" src="/src/pages/login.js"></script>
</body>
</html>
